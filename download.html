<!DOCTYPE html>
<html>

<head>

<title>Download | Excel-IQ</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<section class="download-page">

<h2 id="title">Get Your Download</h2>

<p id="subtitle">Enter your details to continue.</p>

<form id="download-form">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="hidden" name="source" id="source">

<button type="submit" class="primary" id="download-btn">
Download
</button>

</form>

<p style="font-size:14px; color:#666;">
We respect your privacy. Your email will only be used to send Excel learning resources.
</p>

</section>

<script>

// 👉 Get product from URL
const params = new URLSearchParams(window.location.search);
const product = params.get("product");

// 👉 Elements
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const sourceInput = document.getElementById("source");
const button = document.getElementById("download-btn");

// 👉 Default = Ebook
let source = "Ebook Download";

// 👉 Dynamic Content
if(product === "finance-dashboard"){
    
    title.innerText = "Download Finance Dashboard";
    subtitle.innerText = "Get your Excel Finance Intelligence Dashboard.";
    button.innerText = "Download Dashboard";
    source = "Finance Dashboard Download";

} else {
    
    title.innerText = "Download Excel Starter Kit";
    subtitle.innerText = "Get started with Excel dashboards and tools.";
    button.innerText = "Download Starter Kit";
    source = "Ebook Download";

}

// 👉 Set source
sourceInput.value = source;


// 👉 Form Submit
const form = document.getElementById("download-form");

form.addEventListener("submit", function(e){

e.preventDefault();

const data = new FormData(form);
const params = new URLSearchParams(data);

// Send to Google Sheets
navigator.sendBeacon(
"https://script.google.com/macros/s/AKfycbxfT-bBKoGzI-NJcQa8TR4_mdE7GcZqED91tAbFmi1OGS6g-qsn5MZLsf4p4vchnbKDSA/exec",
params
);

// Redirect WITH product info
setTimeout(function(){

window.location.href = "/Excel-IQ/success.html?product=" + (product || "ebook");

}, 350);

});

</script>

</body>

</html>
